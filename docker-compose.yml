services:
  app:
    build: .
    network_mode: host
    environment:
      - HA_TOKEN=${HA_TOKEN}
      - ZENDURE_DEVICE_IP=${ZENDURE_DEVICE_IP}
      - ZENDURE_DEVICE_PORT=${ZENDURE_DEVICE_PORT:-13248}
      - ZENDURE_DEVICE_SERIAL=${ZENDURE_DEVICE_SERIAL}
      - ZENDURE_MAX_CHARGE_POWER=${ZENDURE_MAX_CHARGE_POWER:-2400}
      - ZENDURE_MAX_DISCHARGE_POWER=${ZENDURE_MAX_DISCHARGE_POWER:-2400}
      - ZENDURE_POLL_INTERVAL=${ZENDURE_POLL_INTERVAL:-30}
      - ZENDURE_LOG_LEVEL=${ZENDURE_LOG_LEVEL:-info}
    restart: unless-stopped
