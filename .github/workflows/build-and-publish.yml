# Builds, tests, and publishes the ZendureHAPlugin image to the GitHub Container Registry.
#
# Strategy: the plugin is pure Java, so we compile ONCE on the runner (running the full test
# suites as a gate) and then package the same jar into a multi-arch image via Dockerfile —
# only the JRE base layer differs per architecture, so there is no emulated (QEMU) compilation
# and the arm64 variant is essentially free.
#
# Pull on the home server with:  docker pull ghcr.io/arpadk/zendure-ha-plugin:latest
name: Build & publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Test & package
        run: mvn --batch-mode clean package

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
